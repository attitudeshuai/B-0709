<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>WordVault 单词本</title>
  <style>
    body {
      width: 320px;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 12px 16px;
      font-weight: 600;
      font-size: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat {
      font-size: 12px;
      opacity: 0.8;
      font-weight: normal;
    }

    #word-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .item {
      background: white;
      border-bottom: 1px solid #eee;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .item:hover {
      background: #f4f4f5;
    }

    .row-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .w-text {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }

    .w-trans {
      font-size: 13px;
      color: #666;
      margin-left: 8px;
      flex: 1;
      text-overflow: ellipsis;
      white-space: nowrap;
      overflow: hidden;
    }

    .w-badge {
      background: #e0e7ff;
      color: #4338ca;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 600;
    }

    .details {
      display: none;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed #eee;
      font-size: 12px;
      color: #555;
    }

    .details.open {
      display: block;
    }

    .ex-bullet {
      color: #4f46e5;
      margin-right: 4px;
    }

    .empty {
      padding: 40px;
      text-align: center;
      color: #999;
      font-size: 13px;
    }
  </style>
  <!-- Inject Scripts -->
  <script src="lib/dexie.min.js"></script>
  <script src="db.js"></script>
  <script src="popup.js" defer></script>
</head>

<body>
  <header>
    WordVault 单词本
    <span class="stat" id="total-count">0 个单词</span>
  </header>
  <ul id="word-list">
    <!-- Items go here -->
  </ul>
</body>

</html>
